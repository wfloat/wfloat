name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI after building and testing wheels"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "wfloat-v*"

permissions:
  contents: read

jobs:
  validate_version:
    name: Validate version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check tag version
        shell: bash
        run: |
          package_version="$(python3 - <<'PY'
          namespace = {}
          with open("packages/wfloat-python/python/wfloat/_version.py", encoding="utf8") as version_file:
              exec(version_file.read(), namespace)
          print(namespace["__version__"])
          PY
          )"

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Package version: ${package_version}"
            exit 0
          fi

          tag_version="${GITHUB_REF_NAME#wfloat-v}"
          if [[ "${GITHUB_REF_NAME}" != "wfloat-v${tag_version}" || "${tag_version}" == "${GITHUB_REF_NAME}" ]]; then
            echo "Unexpected tag name: ${GITHUB_REF_NAME}" >&2
            echo "Expected format: wfloat-v<version>" >&2
            exit 1
          fi

          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "Tag version ${tag_version} does not match package version ${package_version}." >&2
            exit 1
          fi

  build_wheels:
    name: Build wheels (${{ matrix.os }})
    needs:
      - validate_version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: windows-latest
          - os: macos-15-intel
          - os: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-musllinux* *-win32"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014
          CIBW_TEST_COMMAND: 'python -c "from wfloat import _core; print(_core._load_core_library())"'
          CIBW_ENVIRONMENT: >-
            WFLOAT_CORE_BUILD_PARALLEL="2"
        with:
          package-dir: packages/wfloat-python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  publish_pypi:
    name: Publish to PyPI
    needs:
      - build_wheels
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/wfloat/
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
